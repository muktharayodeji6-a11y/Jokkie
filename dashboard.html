<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JokerPanel Dashboard</title>
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<div class="login-box">

<h1>🚀 JokerPanel</h1>

<h3>Welcome Admin</h3>

<hr>

<p>💰 Balance: <span id="balance">$0.00</span></p>

<p>📦 Active Campaigns: <span id="campaigns">0</span></p>

<p>⏳ Pending Batches: <span id="batches">0</span></p>

<button onclick="location.href='new-order.html'">
➕ New Campaign
</button>

<br><br>

<button onclick="location.href='orders.html'">
📋 Campaigns
</button>

<br><br>

<button onclick="location.href='wallet.html'">
💳 Wallet
</button>

<br><br>

<button onclick="logout()">
🚪 Logout
</button>

</div>

<script>
function logout(){
localStorage.removeItem("loggedIn");
window.location.href="index.html";
}

if(localStorage.getItem("loggedIn")!="true"){
window.location.href="index.html";
}
</script>

</body>
</html>
